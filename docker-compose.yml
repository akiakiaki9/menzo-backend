services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: tavsia_db
      POSTGRES_USER: tavsia_user
      POSTGRES_PASSWORD: tavsia_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tavsia_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    environment:
      DEBUG: "True"
      DATABASE_URL: "postgresql://tavsia_user:tavsia_password@db:5432/tavsia_db"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    command: gunicorn --bind 0.0.0.0:8000 --timeout 120 --workers 3 core.wsgi:application

volumes:
  postgres_data: